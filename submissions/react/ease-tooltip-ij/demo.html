<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Tooltip (Elastic Slide) Showcase</title>

    <!-- EaseMotion Core CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />

    <!-- Local Component Styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- React 18 & ReactDOM 18 -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      :root {
        --bg-color: #0b0f19;
        --panel-bg: rgba(17, 24, 39, 0.7);
        --border-color: rgba(255, 255, 255, 0.08);
        --text-color: #f3f4f6;
        --text-muted: #9ca3af;
        --primary-color: #6366f1;
        --primary-hover: #4f46e5;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(99, 102, 241, 0.12) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(168, 85, 247, 0.08) 0px,
            transparent 50%
          );
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem 1rem;
      }

      main {
        width: 100%;
        max-width: 720px;
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 2.5rem;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      header {
        margin-bottom: 2.5rem;
      }

      header h1 {
        font-size: 2.25rem;
        font-weight: 800;
        background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }

      header p {
        color: var(--text-muted);
        font-size: 1rem;
      }

      /* Grid of Triggers */
      .grid-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 3rem;
        margin: 3rem 0;
      }

      .tooltip-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .tooltip-card h3 {
        font-size: 0.95rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* Target Buttons */
      .ease-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: var(--primary-color);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.2s;
        outline: none;
      }

      .ease-btn:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
      }

      .ease-btn:focus-visible {
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.4);
      }

      /* Interactive Elements inside tooltip */
      .custom-tooltip-content {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 500;
      }

      .emoji-icon {
        font-size: 1.1rem;
      }

      @media (max-width: 600px) {
        main {
          padding: 1.5rem;
        }
        .grid-container {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useRef } = React;

      // React Tooltip component definition
      const Tooltip = ({ content, position = "top", delay = 0, children }) => {
        const [isVisible, setIsVisible] = useState(false);
        const timeoutRef = useRef(null);

        const showTooltip = () => {
          if (timeoutRef.current) {
            clearTimeout(timeoutRef.current);
          }
          if (delay > 0) {
            timeoutRef.current = setTimeout(() => {
              setIsVisible(true);
            }, delay);
          } else {
            setIsVisible(true);
          }
        };

        const hideTooltip = () => {
          if (timeoutRef.current) {
            clearTimeout(timeoutRef.current);
          }
          setIsVisible(false);
        };

        const animationClass = `ease-tooltip-animate-${position}`;
        const positionClass = `ease-tooltip-${position}`;

        return (
          <div
            className="ease-tooltip-wrapper"
            onMouseEnter={showTooltip}
            onMouseLeave={hideTooltip}
            onFocus={showTooltip}
            onBlur={hideTooltip}
          >
            {children}
            {isVisible && (
              <div
                className={`ease-tooltip-bubble ${positionClass} ${animationClass}`}
                role="tooltip"
                aria-live="polite"
              >
                {content}
              </div>
            )}
          </div>
        );
      };

      // Showcase Application
      const App = () => {
        return (
          <main>
            <header>
              <h1>React Tooltip</h1>
              <p>
                Interactive demonstration of the reusable Tooltip component with
                Spring/Elastic overshoots
              </p>
            </header>

            <div class="grid-container">
              {/* Top Position */}
              <div class="tooltip-card">
                <h3>Tooltip Top</h3>
                <Tooltip content="Tooltip slides up from bottom" position="top">
                  <button class="ease-btn">Slide Top</button>
                </Tooltip>
              </div>

              {/* Bottom Position */}
              <div class="tooltip-card">
                <h3>Tooltip Bottom</h3>
                <Tooltip
                  content="Tooltip slides down from top"
                  position="bottom"
                >
                  <button class="ease-btn">Slide Bottom</button>
                </Tooltip>
              </div>

              {/* Left Position */}
              <div class="tooltip-card">
                <h3>Tooltip Left</h3>
                <Tooltip
                  content="Tooltip slides left from right"
                  position="left"
                >
                  <button class="ease-btn">Slide Left</button>
                </Tooltip>
              </div>

              {/* Right Position */}
              <div class="tooltip-card">
                <h3>Tooltip Right</h3>
                <Tooltip
                  content="Tooltip slides right from left"
                  position="right"
                >
                  <button class="ease-btn">Slide Right</button>
                </Tooltip>
              </div>

              {/* Staggered Delay Example */}
              <div class="tooltip-card">
                <h3>Hover Delay (500ms)</h3>
                <Tooltip
                  content="Delayed tooltip activation"
                  position="top"
                  delay={500}
                >
                  <button class="ease-btn" style={{ background: "#ec4899" }}>
                    Delayed Tooltip
                  </button>
                </Tooltip>
              </div>

              {/* Rich Content Example */}
              <div class="tooltip-card">
                <h3>Rich Tooltip Content</h3>
                <Tooltip
                  content={
                    <div className="custom-tooltip-content">
                      <span className="emoji-icon">🚀</span>
                      <span>Action Success!</span>
                    </div>
                  }
                  position="bottom"
                >
                  <button class="ease-btn" style={{ background: "#10b981" }}>
                    Rich Content
                  </button>
                </Tooltip>
              </div>
            </div>
          </main>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
